<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- ============================================================
       OG image · Marca DNR v2 (modo claro)
       Paleta secc. 3 · Regla de oro secc. 6 (sin degradados, sin
       glow, sin negro puro) · Tipografía Inter (secc. 7)
       ============================================================ -->
  <defs>
    <style>
      .h  { font-family: 'Inter', system-ui, sans-serif; font-weight: 800; fill: #162B43; }
      .b  { font-family: 'Inter', system-ui, sans-serif; font-weight: 500; fill: #2C3E50; }
      .m  { font-family: 'JetBrains Mono', ui-monospace, monospace; font-weight: 600; fill: #B95319; letter-spacing: 2px; }
      .s  { font-family: 'Inter', system-ui, sans-serif; font-weight: 600; fill: #64748B; }
    </style>
  </defs>

  <!-- Lienzo Blanco Nieve -->
  <rect width="1200" height="630" fill="#FAFAFA"/>

  <!-- Área de respeto: barra de acento a la izquierda (cobre) -->
  <rect x="0" y="0" width="10" height="630" fill="#B95319"/>

  <!-- Línea de tendencia con nodos (motivo de la N), plana y mate -->
  <polyline points="80,470 250,440 420,455 590,395 760,415 940,340 1130,368"
            fill="none" stroke="#E2E8F0" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="250" cy="440" r="7" fill="#4A525D"/>
  <circle cx="590" cy="395" r="9" fill="#B95319"/>
  <circle cx="940" cy="340" r="9" fill="#B95319"/>
  <circle cx="420" cy="455" r="6" fill="#4A525D"/>
  <circle cx="760" cy="415" r="6" fill="#4A525D"/>
  <circle cx="1130" cy="368" r="7" fill="#4A525D"/>

  <!-- Monograma DNR: D + N(nodos) + R -->
  <g transform="translate(90,110)">
    <text class="h" x="0" y="86" font-size="112">D</text>
    <!-- N como línea de tendencia con nodos, en cobre -->
    <g transform="translate(96,4)">
      <polyline points="10,92 10,20 68,92 68,12" fill="none" stroke="#B95319"
                stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="10" cy="20" r="8.5" fill="#B95319"/>
      <circle cx="68" cy="12" r="10" fill="#B95319"/>
      <circle cx="10" cy="92" r="7" fill="#162B43"/>
      <circle cx="68" cy="92" r="7" fill="#162B43"/>
    </g>
    <text class="h" x="188" y="86" font-size="112">R</text>
  </g>

  <!-- Nombre y rol -->
  <text class="m" x="92" y="250" font-size="20">PORTFOLIO ADAPTATIVO</text>
  <text class="h" x="90" y="322" font-size="66">David Naranjo Ramírez</text>
  <text class="b" x="92" y="374" font-size="30">Data Science · Desarrollo Full-Stack</text>

  <!-- Claim: el contenido se recompila según quién lo visita -->
  <text class="s" x="92" y="560" font-size="24">El portfolio que se recompila según quién lo visita.</text>
</svg>
